<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Foreign Speaking</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <a href="index.html" class="home-link"><h1>Foreign Speaking</h1></a>
            <h2>로그인</h2>
            <div class="input-group">
                <label for="login-email">이메일</label>
                <input type="email" id="login-email" placeholder="이메일" required>
            </div>
            <div class="input-group">
                <label for="login-password">비밀번호</label>
                <input type="password" id="login-password" placeholder="비밀번호" required>
            </div>
            <button id="login-button">로그인</button>
            <p class="auth-switch">계정이 없으신가요? <a href="signup.html">회원가입</a></p>
            <p id="error-message" class="error-message"></p>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="speak_config.js"></script>
    <script src="speak_auth.js"></script>
    <script>
        document.getElementById('login-button').onclick = handleLogin;
    </script>
</body>
</html>
